<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Great Mind - Memory Console</title>

    <!-- 字体与图标 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- 代码高亮样式 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/styles/atom-one-dark-reasonable.min.css">

    <style>
        :root {
            /* 基础色板 - Light */
            --primary: #4f46e5;       /* Indigo 600 */
            --primary-hover: #4338ca;
            --primary-light: #e0e7ff;

            --bg-body: #f8fafc;       /* Slate 50 */
            --bg-surface: #ffffff;
            --bg-surface-glass: rgba(255, 255, 255, 0.85);

            --text-main: #0f172a;     /* Slate 900 */
            --text-sec: #64748b;      /* Slate 500 */
            --text-muted: #94a3b8;    /* Slate 400 */

            --border: #e2e8f0;        /* Slate 200 */
            --border-hover: #cbd5e1;

            --accent-perm: #d97706;   /* Amber 600 */
            --accent-perm-bg: #fffbeb;

            --success: #10b981;
            --danger: #ef4444;

            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);

            --radius-md: 8px;
            --radius-lg: 12px;
            --radius-xl: 16px;
        }

        [data-theme="dark"] {
            /* 基础色板 - Dark */
            --primary: #6366f1;       /* Indigo 500 */
            --primary-hover: #818cf8;
            --primary-light: rgba(99, 102, 241, 0.15);

            --bg-body: #020617;       /* Slate 950 */
            --bg-surface: #0f172a;    /* Slate 900 */
            --bg-surface-glass: rgba(15, 23, 42, 0.85);

            --text-main: #f1f5f9;     /* Slate 100 */
            --text-sec: #94a3b8;      /* Slate 400 */
            --text-muted: #475569;    /* Slate 600 */

            --border: #1e293b;        /* Slate 800 */
            --border-hover: #334155;

            --accent-perm: #fbbf24;   /* Amber 400 */
            --accent-perm-bg: rgba(251, 191, 36, 0.1);
        }

        /* 全局重置 */
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            overflow: hidden;
            transition: background-color 0.3s, color 0.3s;
        }

        /* 通用工具类 */
        .glass {
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            background: var(--bg-surface-glass);
        }

        .btn-icon {
            width: 36px;
            height: 36px;
            border-radius: var(--radius-md);
            border: 1px solid transparent;
            background: transparent;
            color: var(--text-sec);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .btn-icon:hover { background: var(--bg-body); color: var(--text-main); border-color: var(--border); }
        .btn-icon.active { color: var(--primary); background: var(--primary-light); }

        .tooltip { position: relative; }

        /* 滚动条 */
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

        /* ================= 侧边栏 ================= */
        .sidebar {
            width: 280px;
            background: var(--bg-surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            z-index: 50;
             overflow: hidden; /* 收起时隐藏内容 */
    white-space: nowrap; /* 防止文字换行 */
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
/* 侧边栏收起状态 (桌面端) */
.sidebar.collapsed {
    width: 0;
    border-right: none;
}

/* 侧边栏展开/收起按钮 (桌面端显示，移动端隐藏) */
.desktop-menu-btn {
    display: flex;
}
@media (max-width: 768px) {
    .desktop-menu-btn { display: none; }
    /* 移动端逻辑保持原有 .mobile-menu-btn */
}

/* --- 编辑按钮样式 --- */
.action-btn.edit:hover {
    background: rgba(59, 130, 246, 0.1);
    color: var(--primary);
}
        .brand {
            padding: 24px 20px;
            font-size: 18px;
            font-weight: 700;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 12px;
            letter-spacing: -0.5px;
        }
        .brand i { color: var(--primary); font-size: 20px; }

        .sidebar-controls { padding: 0 16px 16px; }

        .btn-new-chat {
            width: 100%;
            padding: 10px;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: var(--radius-md);
            font-weight: 500;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 2px 4px rgba(79, 70, 229, 0.2);
            transition: transform 0.1s, background 0.2s;
        }
        .btn-new-chat:hover { background: var(--primary-hover); }
        .btn-new-chat:active { transform: translateY(1px); }

        .chat-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px 12px;
        }

        .chat-item {
            padding: 10px 12px;
            margin-bottom: 4px;
            border-radius: var(--radius-md);
            cursor: pointer;
            color: var(--text-sec);
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.2s;
            group: chat-item;
        }
        .chat-item:hover { background: var(--bg-body); color: var(--text-main); }
        .chat-item.active { background: var(--primary-light); color: var(--primary); font-weight: 500; }

        .chat-item-title {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 200px;
        }

.chat-actions {
    display: flex;
    gap: 4px;
    opacity: 0;
    transition: opacity 0.2s;
}
        .chat-item:hover .chat-actions { opacity: 1; }
.chat-actions i {
    padding: 6px;
    font-size: 12px;
    border-radius: 4px;
    color: var(--text-sec);
    cursor: pointer;
    transition: all 0.2s;
}
        .chat-actions i:hover { color: var(--danger); background: rgba(239, 68, 68, 0.1); }
.chat-actions .fa-pen:hover {
    color: var(--primary);
    background: var(--primary-light);
}
.chat-actions .fa-trash-can:hover {
    color: var(--danger);
    background: rgba(239, 68, 68, 0.1);
}
        .sidebar-footer {
            padding: 16px;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        /* ================= 主区域 ================= */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            background: var(--bg-body);
        }

        /* 顶部栏 */
        .header {
            height: 60px;
            padding: 0 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 20;
            position: sticky;
            top: 0;
        }

        .header-left { display: flex; align-items: center; gap: 16px; flex: 1; min-width: 0; }

        .mobile-menu-btn { display: none; } /* Mobile toggle */

        .chat-meta { display: flex; flex-direction: column; min-width: 0; }
        .chat-title { font-weight: 600; font-size: 15px; color: var(--text-main); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .chat-model { font-size: 11px; color: var(--text-sec); margin-top: 2px; }

        .model-selector {
            background: transparent;
            border: none;
            color: var(--text-sec);
            font-size: 11px;
            font-family: inherit;
            cursor: pointer;
            padding: 2px 0;
        }
        .model-selector:hover { color: var(--primary); }

        .header-actions {
    display: flex;
    gap: 12px; /* 增加间距 */
}
.btn-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 16px; /* 增加点击区域 */
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    color: var(--text-main);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap; /* 防止文字换行 */
}
.btn-header:hover {
    border-color: var(--primary);
    color: var(--primary);
    background: var(--primary-light);
    transform: translateY(-1px);
    box-shadow: var(--shadow-sm);
}

/* --- 等待回复动画 (Typing Indicator) --- */
.typing-indicator {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 16px 20px;
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    border-bottom-left-radius: 2px;
    width: fit-content;
}

.dot {
    width: 6px;
    height: 6px;
    background-color: var(--text-muted);
    border-radius: 50%;
    animation: typingBounce 1.4s infinite ease-in-out both;
}

.dot:nth-child(1) { animation-delay: -0.32s; }
.dot:nth-child(2) { animation-delay: -0.16s; }
@keyframes typingBounce {
    0%, 80%, 100% { transform: scale(0); opacity: 0.6; }
    40% { transform: scale(1); opacity: 1; }
}
        /* 聊天流 */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px 24px 120px 24px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            scroll-behavior: smooth;
        }

        .empty-state {
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            text-align: center;
        }
        .empty-state i { font-size: 48px; margin-bottom: 16px; opacity: 0.5; }
        .empty-state h3 { font-size: 18px; color: var(--text-main); margin-bottom: 8px; }

        /* 消息气泡 */
        .msg-row {
            display: flex;
            gap: 12px;
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
        }
        .msg-row.user { justify-content: flex-end; }

        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
        }
        .avatar.ai { background: var(--primary); color: white; }
        .avatar.user { background: var(--text-sec); color: white; order: 2; }

        .bubble {
            background: var(--bg-surface);
            padding: 16px 20px;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
            color: var(--text-main);
            box-shadow: var(--shadow-sm);
            max-width: 85%;
            position: relative;
            line-height: 1.6;
            font-size: 15px;
        }

        .msg-row.user .bubble {
            background: var(--primary);
            color: white;
            border-color: transparent;
            border-bottom-right-radius: 2px;
            order: 1;
        }
        .msg-row.model .bubble {
            border-bottom-left-radius: 2px;
        }

        /* 记忆状态栏 */
 /* --- 消息底部工具栏 --- */
.bubble-footer {
    display: flex;
    justify-content: space-between; /* 两端对齐：左边记忆标签，右边操作按钮 */
    align-items: center;
    gap: 12px;
    padding-top: 12px;
    margin-top: 12px;
    border-top: 1px dashed var(--border);
}

.tags-area {
    display: flex;
    gap: 8px;
}

.actions-area {
    display: flex;
    gap: 4px;
    opacity: 0.6;
    transition: opacity 0.2s;
}
.bubble:hover .actions-area { opacity: 1; }

.action-btn {
    {#background: transparent;#}
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 12px;
    padding: 4px;
        background: rgba(0, 0, 0, 0.04);
    width: auto; /* 允许宽度随文字自适应 */
    border-radius: 4px;
    display: flex;
    align-items: center;
    gap: 4px;
    transition: all 0.2s;
}
.action-btn:hover { background: rgba(0,0,0,0.05); color: var(--text-main); }
.action-btn.del:hover { background: rgba(239, 68, 68, 0.1); color: var(--danger); }
/* --- 增大底部按钮体积并支持文字显示 --- */
.tag, .action-btn {
    padding: 6px 12px !important;  /* 增加内边距 */
    font-size: 12px !important;    /* 增加字号 */
    height: 30px;                  /* 增加高度 */
    border-radius: 6px;
    display: flex;
    align-items: center;
    gap: 6px;                      /* 图标与文字的间距 */
    line-height: 1;
}
/* --- 代码块复制按钮 --- */
.markdown-body pre {
    position: relative; /* 为绝对定位的按钮做参照 */
}

.code-copy-btn {
    position: absolute;
    top: 6px;
    right: 6px;
    background: rgba(255, 255, 255, 0.1);
    border: 1px solid rgba(255, 255, 255, 0.2);
    color: #a0a0a0;
    font-size: 12px;
    padding: 6px 12px;
     height: 30px;
    border-radius: 4px;
    cursor: pointer;
    opacity: 0;
    transition: all 0.2s;
    font-family: sans-serif;
}

/* 只有鼠标悬停在代码块上时才显示按钮 */
.markdown-body pre:hover .code-copy-btn {
    opacity: 1;
}

.code-copy-btn:hover {
    background: rgba(255, 255, 255, 0.2);
    color: white;
}
.code-copy-btn.copied {
    background: #10b981;
    color: white;
    border-color: #10b981;
}
        .msg-row.user .bubble-footer { border-top-color: rgba(255,255,255,0.2); }

        .tag {
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 4px;
            transition: 0.2s;
            border: 1px solid transparent;
            user-select: none;
        }

        /* 状态样式 */
        .tag-mem-active { background: #ecfdf5; color: #059669; border-color: #a7f3d0; }
        .tag-mem-inactive { background: var(--bg-body); color: var(--text-muted); }
        .tag-perm { background: var(--accent-perm-bg); color: var(--accent-perm); border-color: rgba(251, 191, 36, 0.4); }

        [data-theme="dark"] .tag-mem-active { background: rgba(5, 150, 105, 0.2); color: #6ee7b7; border-color: rgba(5, 150, 105, 0.3); }

        /* 输入区域 */
        .input-wrapper {
            position: absolute;
            bottom: 30px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            padding: 0 20px;
            z-index: 30;
        }

        .input-box {
            width: 100%;
            max-width: 800px;
            background: var(--bg-surface-glass);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            padding-left: 12px;
            box-shadow: var(--shadow-lg);
            display: flex;
            align-items: flex-end;
            gap: 8px;
            backdrop-filter: blur(10px);
        }

        .input-box textarea {
            flex: 1;
            background: transparent;
            border: none;
            padding: 12px;
            max-height: 150px;
            resize: none;
            outline: none;
            font-family: inherit;
            font-size: 15px;
            color: var(--text-main);
            line-height: 1.5;
        }

        .btn-send {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: var(--primary);
            color: white;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            margin-bottom: 2px;
        }
        .btn-send:hover { background: var(--primary-hover); transform: scale(1.05); }
        .btn-send:disabled { background: var(--text-muted); cursor: not-allowed; transform: none; }

        /* ================= 永久记忆抽屉 (Right Drawer) ================= */
        .drawer {
            position: fixed;
            top: 0;
            right: -350px;
            width: 350px;
            height: 100%;
            background: var(--bg-surface);
            border-left: 1px solid var(--border);
            box-shadow: -5px 0 25px rgba(0,0,0,0.1);
            z-index: 100;
            transition: right 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
        }
        .drawer.open { right: 0; }

        .drawer-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 600;
            color: var(--accent-perm);
        }

        .drawer-body {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .perm-item {
            background: var(--bg-body);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 12px;
            margin-bottom: 16px;
        }
        .perm-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 11px;
            color: var(--text-muted);
            font-weight: 600;
        }
        .perm-edit-area {
            width: 100%;
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 8px;
            font-size: 13px;
            font-family: 'JetBrains Mono', monospace;
            color: var(--text-main);
            min-height: 80px;
            resize: vertical;
        }
/* 附件预览区域 */
.preview-area {
    width: 100%;
    display: flex;
    gap: 10px;
    padding: 0 12px;
    margin-bottom: 8px;
    overflow-x: auto;
}
.preview-item {
    position: relative;
    width: 60px;
    height: 60px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background-size: cover;
    background-position: center;
    background-color: var(--bg-surface);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
}
.preview-item i { font-size: 24px; color: var(--text-muted); }
.preview-close {
    position: absolute;
    top: -5px; right: -5px;
    background: var(--danger);
    color: white;
    border-radius: 50%;
    width: 16px; height: 16px;
    font-size: 10px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
}

/* 聊天记录中的媒体显示 */
.msg-media-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 8px;
}
.chat-image {
    max-width: 100%;
    max-height: 300px;
    border-radius: 8px;
    cursor: pointer;
    border: 1px solid rgba(0,0,0,0.1);
}
.chat-file {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    background: rgba(0,0,0,0.05);
    border-radius: 8px;
    font-size: 13px;
    color: var(--text-main);
}
/* 修改输入框布局以容纳附件按钮 */

.btn-attach {
    color: var(--text-sec);
    background: transparent;
    border: none;
    font-size: 18px;
    padding: 8px;
    cursor: pointer;
    transition: 0.2s;
    margin-bottom: 4px; /* 对齐 */
}
.btn-attach:hover { color: var(--primary); }
        /* ================= 模态框 & 覆盖层 ================= */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            z-index: 200;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .modal-overlay.active { display: flex; opacity: 1; }

        .modal {
            background: var(--bg-surface);
            width: 90%;
            max-width: 450px;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-lg);
            padding: 24px;
            transform: scale(0.95);
            transition: transform 0.2s;
        }
        .modal-overlay.active .modal { transform: scale(1); }

        .modal-title { font-size: 18px; font-weight: 600; margin-bottom: 8px; color: var(--text-main); }
        .modal-desc { font-size: 14px; color: var(--text-sec); margin-bottom: 20px; line-height: 1.5; }

        .modal-input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            background: var(--bg-body);
            color: var(--text-main);
            font-size: 14px;
            margin-bottom: 20px;
            outline: none;
        }
        .modal-input:focus { border-color: var(--primary); box-shadow: 0 0 0 2px var(--primary-light); }

        .modal-footer { display: flex; justify-content: flex-end; gap: 10px; }

        .btn {
            padding: 8px 16px;
            border-radius: var(--radius-md);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            border: none;
            transition: 0.2s;
        }
        .btn-ghost { background: transparent; color: var(--text-sec); }
        .btn-ghost:hover { background: var(--bg-body); color: var(--text-main); }

async function loadModels() {
    try {
        const select = document.getElementById('model-select');
        const res = await fetch('/api/get_models');
        const data = await res.json();

            select.innerHTML = '';
            data.models.forEach(m => {
                const opt = document.createElement('option');
                opt.value = m.id;
                opt.innerText = m.display.replace('models/', '');
                select.appendChild(opt);
            });

        // --- 逻辑优先级：LocalStorage > Gemini 3 Flash > 第一个模型 ---
        const saved = localStorage.getItem('selected_model');

        if (saved && Array.from(select.options).some(o => o.value === saved)) {
            // 1. 如果有用户手动保存的选择，优先使用
            select.value = saved;
        } else {
            // 2. 否则，自动寻找带有 "gemini-3-flash" 关键词的模型
            const flashOpt = Array.from(select.options).find(o =>
                o.value.toLowerCase().includes('gemini-3-flash')
            );
            if (flashOpt) {
                select.value = flashOpt.value;
                localStorage.setItem('selected_model', select.value);
            }
        }

        select.onchange = () => localStorage.setItem('selected_model', select.value);
    } catch (e) {
        console.error(e);
        // 这里的 showToast 需确保您的 index.html 中有定义
       showToast("模型加载失败", "error");

async function confirmRename() {
    const input = document.getElementById('rename-input');
    const newName = input.value.trim();

    if (!newName) return showToast("名称不能为空", "error");
    if (newName === chatToRenameId) return closeModal('modal-rename'); // 没改动直接关闭

    try {
        const res = await fetch('/api/rename_chat', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                old_chat_id: chatToRenameId,
                new_chat_id: newName
            })
        });
        const data = await res.json();

        if (data.error) {
            showToast(data.error, "error");
        } else {
            // 如果当前正在聊天的就是被改名的这个，更新全局ID和标题
            if (currentChatId === chatToRenameId) {
                currentChatId = newName;
                document.getElementById('current-chat-title').innerText = newName;
            }

            showToast("重命名成功");
            closeModal('modal-rename');
            loadChatList(); // 刷新列表
        }
    } catch (e) {
        showToast("请求失败", "error");
    }
}

            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                chat_id: currentChatId,
                message: msg,
                model: model,
                attachments: payloadAttachments.map(a => ({
                    name: a.name,
                    mime_type: a.mime_type,
                    data: a.data
                }))
            })
        });

        if (!response.ok) throw new Error("Network response was not ok");

        // 5. 处理流 (Stream Reader)
        const reader = response.body.getReader();
        const decoder = new TextDecoder("utf-8");
        let isFirstChunk = true;

        while (true) {
            const { done, value } = await reader.read();
            if (done) break;

            const chunk = decoder.decode(value, { stream: true });
            accumulatedText += chunk;

            // 收到第一个块时，移除 loading 动画
            if (isFirstChunk) {
                isFirstChunk = false;
                aiContentDiv.innerHTML = '';
            }

            // 实时渲染 Markdown
            const rawHtml = marked.parse(accumulatedText);
            aiContentDiv.innerHTML = `<div class="markdown-body">${rawHtml}</div>`;

            // 保持滚动到底部
            container.scrollTop = container.scrollHeight;
        }

        // 6. 流结束后的完美渲染
        aiContentDiv.innerHTML = `<div class="markdown-body">${marked.parse(accumulatedText)}</div>`;
        if (window.hljs) aiContentDiv.querySelectorAll('pre code').forEach(hljs.highlightElement);
        addCodeCopyButtons(aiContentDiv);

        // 这里不再手动追加 footer，因为索引可能已过时，依靠 finally 中的刷新来处理

    } catch (e) {
        aiContentDiv.innerHTML += `<div style="color:var(--danger); margin-top:10px;">[发送失败: ${e.message}]</div>`;
        showToast("消息发送中断", "error");
    } finally {
        btn.disabled = false;
        if (!isMobile()) input.focus();

        // --- 关键修复：强制刷新列表以同步索引 ---
        // 流式传输结束后，后端的历史记录长度增加了2条。
        // 如果不刷新，前端的旧索引会导致编辑/删除功能错位。
        // 设置 500ms 延迟是为了等待后端文件写入锁完全释放。
        setTimeout(() => selectChat(currentChatId), 500);
    }
}

// 辅助：文本复制
function copyTextToClipboard(text) {
    if (navigator.clipboard && window.isSecureContext) {
        navigator.clipboard.writeText(text).then(() => showToast("已复制"));
    } else {
        // Fallback
        const textarea = document.createElement('textarea');
        textarea.value = text;
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand('copy');
        document.body.removeChild(textarea);
        showToast("已复制");
    }
}

// --- 2. 历史记录渲染函数 (支持附件显示 + 完整功能按钮) ---
function renderHistory(history) {
    const container = document.getElementById('chat-container');
    container.innerHTML = '';

    history.forEach((msg, index) => {
        const isUser = msg.role === 'user';
        const row = document.createElement('div');
        row.className = `msg-row ${isUser ? 'user' : 'model'}`;

        // 头像
        const avatar = document.createElement('div');
        avatar.className = `avatar ${isUser ? 'user' : 'ai'}`;
        avatar.innerHTML = isUser ? '<i class="fa-solid fa-user"></i>' : '<i class="fa-solid fa-robot"></i>';

        // 1. 处理附件显示 (后端返回的是 base64)
        let mediaHtml = '';
if (msg.attachments && msg.attachments.length > 0) {
    mediaHtml = '<div class="msg-media-grid">';
    msg.attachments.forEach(att => {
        let src = '';
        // 兼容新旧数据结构
        if (att.file_path) {
            src = `/uploads/${att.file_path}`; // 指向后端静态路由
        } else if (att.data) {
            src = `data:${att.mime_type};base64,${att.data}`; // 旧数据
        }

        if (att.mime_type.startsWith('image/')) {
            mediaHtml += `<img src="${src}" class="chat-image" onclick="window.open('${src}')">`;
        } else {
            mediaHtml += `<div class="chat-file"><a href="${src}" target="_blank" style="text-decoration:none; color:inherit;"><i class="fa-solid fa-file-lines"></i> ${att.name || '文件'}</a></div>`;
        }
    });
    mediaHtml += '</div>';
}

        // 2. 处理文本内容 (Markdown渲染)
        let rawContent = msg.content || ""; // 防止 null
        let contentHtml = '';

        if (isUser) {
            // 用户消息不需要 markdown 解析，但需要转义防止 HTML 注入
            contentHtml = rawContent.replace(/\n/g, '<br>');
        } else {
            // AI 消息解析 Markdown 后，必须净化
            contentHtml = marked.parse(rawContent);
        }

        // 3. 状态标签逻辑
        const isMem = msg.is_memory;
        const isPerm = msg.memory_type === 2;
        const memClass = isMem ? 'tag-mem-active' : 'tag-mem-inactive';

        // 4. 构建气泡 HTML
        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        bubble.innerHTML = `
            ${mediaHtml}
            <div class="msg-content markdown-body">${contentHtml}</div>

            <div class="bubble-footer">
                <!-- 左侧：记忆标签 (带文字描述) -->
                <div class="tags-area">
                    <div id="btn-mem-${index}" class="tag ${memClass}" onclick="toggleMemory(${index}, 'status')">
                        ${isMem ? '<i class="fa-solid fa-brain"></i> 记忆中' : '<i class="fa-solid fa-bed"></i> 已遗忘'}
                    </div>
                    <div id="btn-type-${index}" class="tag ${isPerm ? 'tag-perm' : 'tag-mem-inactive'}" onclick="toggleMemory(${index}, 'type')">
                        ${isPerm ? '<i class="fa-solid fa-thumbtack"></i> 永久' : '<i class="fa-solid fa-hourglass"></i> 临时'}
                    </div>
                </div>

                <!-- 右侧：操作按钮 (带文字描述 + 图标) -->
                <div class="actions-area">
                    <button class="action-btn" title="复制整条消息" onclick="copyMessageText(${index})">
                        <i class="fa-regular fa-copy"></i> 复制
                    </button>
                   <!-- 【新增】编辑按钮 -->
                    <button class="action-btn edit" title="编辑内容" onclick="openEditModal(${index})">
                        <i class="fa-solid fa-pen-to-square"></i> 编辑
                    </button>
                    <button class="action-btn del" title="删除此条消息" onclick="deleteMessageItem(${index})">
                        <i class="fa-solid fa-trash"></i> 删除
                    </button>
                </div>
            </div>
        `;

        row.appendChild(avatar);
        row.appendChild(bubble);
        container.appendChild(row);

        // 5. 为气泡内的代码块添加独立复制按钮
        addCodeCopyButtons(bubble);
    });

    // 缓存当前历史数据，供复制功能使用
    window.currentHistoryCache = history;

    // 滚动到底部
    container.scrollTop = container.scrollHeight;
}
// --- 新增：为代码块添加复制按钮 ---
function addCodeCopyButtons(element) {
    // 找到该元素下所有的 pre 标签
    const pres = element.querySelectorAll('pre');
    pres.forEach(pre => {
        // 创建按钮
        const btn = document.createElement('button');
        btn.className = 'code-copy-btn';
        btn.innerHTML = '<i class="fa-regular fa-copy"></i> 复制';

        // 点击事件
        btn.onclick = () => {
            // 获取 pre 内部的 code 文本
            const code = pre.querySelector('code').innerText;
            navigator.clipboard.writeText(code).then(() => {
                // 成功反馈
                btn.innerHTML = '<i class="fa-solid fa-check"></i> 已复制';
                btn.classList.add('copied');
                setTimeout(() => {
                    btn.innerHTML = '<i class="fa-regular fa-copy"></i> 复制';
                    btn.classList.remove('copied');
                }, 2000);
            });

        };

        // 将按钮插入到 pre 标签内 (highlight.js 不会覆盖 pre 的子元素，只会处理 code)
        pre.appendChild(btn);
    });
}

// --- 新增：复制整条消息 ---
function copyMessageText(index) {
    if (window.currentHistoryCache && window.currentHistoryCache[index]) {
        const text = window.currentHistoryCache[index].content;
        navigator.clipboard.writeText(text).then(() => {
            showToast("消息内容已复制");
        }).catch(() => {
            showToast("复制失败", "error");
        });
    }
}

// --- 新增：处理文件选择 ---
async function handleFileSelect(input) {
    const files = Array.from(input.files);
    if(files.length === 0) return;

    for (const file of files) {
        // 简单限制大小 (例如 5MB)
        if (file.size > 5 * 1024 * 1024) {
            showToast(`文件 ${file.name} 太大，跳过`, "error");
            continue;
        }

        const base64Data = await toBase64(file);
        // 去掉 data:image/png;base64, 前缀，后端 API 只需要 raw base64
        const rawBase64 = base64Data.split(',')[1];

        currentAttachments.push({
            name: file.name,
            mime_type: file.type,
            data: rawBase64,
            previewUrl: base64Data //用于前端预览
        });
    }

    renderPreviews();
    input.value = ''; // 重置 input 以便重复选择同名文件
}

function toBase64(file) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => resolve(reader.result);
        reader.onerror = error => reject(error);
    });
}

function renderPreviews() {
    const container = document.getElementById('file-preview-container');
    if (currentAttachments.length === 0) {
        container.style.display = 'none';
        container.innerHTML = '';
        return;
    }

    container.style.display = 'flex';
    container.innerHTML = currentAttachments.map((file, index) => {
        let bgStyle = '';
        let iconHtml = '<i class="fa-solid fa-file"></i>';

        if (file.mime_type.startsWith('image/')) {
            bgStyle = `background-image: url('${file.previewUrl}');`;
            iconHtml = ''; // 图片显示背景，不显示图标
        } else if (file.mime_type === 'application/pdf') {
            iconHtml = '<i class="fa-solid fa-file-pdf" style="color:#ef4444"></i>';
        }

        return `
            <div class="preview-item" style="${bgStyle}">
                ${iconHtml}
                <div class="preview-close" onclick="removeAttachment(${index})">
                    <i class="fa-solid fa-times"></i>
                </div>
            </div>`;
    }).join('');

    // 自动调整输入框位置（如果需要）
}

function removeAttachment(index) {
    currentAttachments.splice(index, 1);
    renderPreviews();
}
